name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Default deny; each job below requests only what it needs.
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # hatch-vcs (see [tool.hatch.version] in pyproject.toml) derives the
          # installed version from `git describe` against reachable tags — a
          # shallow (default) clone has no tag history and silently produces
          # a bogus "0+unknown"-style version instead of failing loudly.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install the upstream graphify CLI (required by the test suite)
        run: pip install "graphifyy @ git+https://github.com/Graphify-Labs/graphify"

      - name: Install graphify-mesh with test extras
        run: pip install -e ".[test]"

      - name: Run the full test suite (release aborts if this fails)
        run: python -m pytest tests/ -q

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Same reason as the `test` job above — `python -m build` triggers
          # hatch-vcs, which needs the full tag history to compute a real
          # version instead of a shallow-clone fallback.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify built version matches the pushed tag
        # hatch-vcs derives the version from `git describe` — this should
        # always equal the tag that triggered this workflow, but "should
        # always" is exactly the class of bug this whole workflow exists to
        # prevent from shipping silently (see CHANGELOG 0.0.4: __version__
        # drifted from the tag for two releases before anyone noticed). Fail
        # loudly instead of trusting it.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          expected="${TAG#v}"
          built=$(ls dist/*.whl | grep -oP 'graphify_mesh-\K[^-]+(?=-py3)')
          echo "tag=${TAG} expected=${expected} built=${built}"
          if [ "$built" != "$expected" ]; then
            echo "::error::Built version '${built}' does not match pushed tag '${TAG}' (expected '${expected}'). Refusing to release."
            exit 1
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  github-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl

  # ---- PEP 503 "simple" index on the gh-pages branch --------------------
  publish-index:
    needs: [github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Check whether gh-pages already exists
        # actions/checkout retries+fails noisily (and can abort the job) when
        # asked to fetch a ref that doesn't exist yet, which is exactly the
        # case on the very first release. Check first instead of relying on
        # continue-on-error to paper over the failed fetch.
        id: gh-pages-check
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out gh-pages
        if: steps.gh-pages-check.outputs.exists == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: gh-pages
          path: pages

      - name: Create empty pages/ dir (gh-pages doesn't exist yet)
        if: steps.gh-pages-check.outputs.exists == 'false'
        run: mkdir -p pages

      - name: Regenerate the simple index
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import html
          import os
          import re
          from pathlib import Path

          tag = os.environ["TAG"]
          repo = os.environ["REPO"]            # e.g. AgentScopeX/graphify-mesh
          base = f"https://github.com/{repo}/releases/download/{tag}"

          pages = Path("pages")
          proj_dir = pages / "simple" / "graphify-mesh"
          proj_dir.mkdir(parents=True, exist_ok=True)
          proj_index = proj_dir / "index.html"

          # Collect existing links (previous releases) plus this release's files.
          # Only carry forward links pointing at this repo's own GitHub release
          # downloads — anything else in the old index (stale, tampered, or
          # foreign hrefs) is dropped instead of being preserved forever.
          trusted_prefix = f"https://github.com/{repo}/releases/download/"
          links: set[str] = set()
          dropped = 0
          if proj_index.exists():
              for href in re.findall(r'href="([^"]+)"', proj_index.read_text(encoding="utf-8")):
                  if not href.startswith(trusted_prefix):
                      dropped += 1
                      continue
                  links.add(href)
          for dist in sorted(Path("dist").glob("*")):
              if dist.suffix in {".whl"} or dist.name.endswith(".tar.gz"):
                  links.add(f"{base}/{dist.name}")

          def filename(url: str) -> str:
              return url.rsplit("/", 1)[-1]

          rows = "\n".join(
              f'    <a href="{html.escape(u)}">{html.escape(filename(u))}</a><br/>'
              for u in sorted(links, key=filename)
          )
          proj_index.write_text(
              "<!DOCTYPE html>\n<html><head>"
              '<meta name="pypi:repository-version" content="1.0"/>'
              "<title>graphify-mesh</title></head><body>\n"
              f"{rows}\n</body></html>\n",
              encoding="utf-8",
          )

          # Root index listing every project.
          root_index = pages / "simple" / "index.html"
          root_index.write_text(
              "<!DOCTYPE html>\n<html><head><title>Simple index</title></head><body>\n"
              '    <a href="graphify-mesh/">graphify-mesh</a><br/>\n'
              "</body></html>\n",
              encoding="utf-8",
          )
          print(
              f"Wrote {proj_index} with {len(links)} trusted file link(s) kept, "
              f"{dropped} untrusted link(s) dropped"
          )
          PY

      - name: Commit and push the updated index
        working-directory: pages
        run: |
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" 2>/dev/null || true
          git add simple
          git commit -m "publish ${TAG}: update PEP 503 simple index" || echo "nothing to commit"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
