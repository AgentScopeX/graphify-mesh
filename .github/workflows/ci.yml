name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: gitleaks — scan git history for hardcoded secrets
        # Plain OSS gitleaks CLI, not gitleaks/gitleaks-action: that Action now
        # requires a paid GITLEAKS_LICENSE for GitHub Organizations. The CLI
        # itself stays free/open-source.
        # The sha256 below is pinned from the official release checksums file:
        # https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_checksums.txt
        run: |
          curl -sSfL -o gitleaks_8.30.1_linux_x64.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks_8.30.1_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz gitleaks
          ./gitleaks detect --source . --no-banner --redact

  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: trufflehog — scan PR commits for verified secrets (pull_request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      - name: trufflehog — scan full git history for verified secrets (push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown

  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install graphify-mesh with test extras
        # graphifyy (the upstream graphify CLI/library) is a declared
        # dependency, so this pulls it from PyPI automatically.
        run: pip install -e ".[test]"

      - name: pip-audit — audit installed Python dependencies for known CVEs
        # pip-audit exits 1 when it finds known vulnerabilities — that MUST
        # fail the job. Only other nonzero exit codes (infra/network errors,
        # e.g. the PyPI advisory DB being unreachable) are downgraded to a
        # logged warning so a transient hiccup doesn't block the pipeline.
        run: |
          pip install pip-audit
          set +e
          pip-audit
          code=$?
          set -e
          case "$code" in
            0)
              echo "pip-audit: no known vulnerabilities found."
              ;;
            1)
              echo "::error::pip-audit found known vulnerabilities in installed dependencies."
              exit 1
              ;;
            *)
              echo "::warning::pip-audit exited with code $code (infra/network error, not a vulnerability finding); not failing the job."
              ;;
          esac

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install graphify-mesh with lint extras
        run: pip install -e ".[lint]"

      - name: ruff — lint
        run: ruff check .

      - name: mypy — type-check src/
        run: mypy src/

  test:
    needs: [gitleaks, trufflehog, pip-audit]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        module: [sync, server, hardening]

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install graphify-mesh with test extras
        # graphifyy (the upstream graphify CLI/library) is a declared
        # dependency, so this pulls it from PyPI automatically.
        run: pip install -e ".[test]"

      - name: Run the ${{ matrix.module }} test suite
        run: python -m pytest tests/${{ matrix.module }} -q

  smoke-test:
    needs: [gitleaks, trufflehog, pip-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install graphify-mesh with test extras
        run: pip install -e ".[test]"

      - name: Smoke-test the console scripts
        run: |
          graphify-mesh-sync --help
          graphify-mesh-server --help
          graphify-mesh-reap --help
