name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks — scan git history for hardcoded secrets
        # Plain OSS gitleaks CLI, not gitleaks/gitleaks-action: that Action now
        # requires a paid GITLEAKS_LICENSE for GitHub Organizations. The CLI
        # itself stays free/open-source.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact

      - name: trufflehog — scan git history for verified secrets
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphify-mesh with test extras
        # graphifyy (the upstream graphify CLI/library) is a declared
        # dependency, so this pulls it from PyPI automatically.
        run: pip install -e ".[test]"

      - name: pip-audit — audit installed Python dependencies for known CVEs
        # Best-effort: depends on reachability of the PyPI advisory DB, so a
        # network hiccup shouldn't fail the whole pipeline the way a real
        # secret leak or a code vulnerability should.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

  test:
    needs: security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install graphify-mesh with test extras
        # graphifyy (the upstream graphify CLI/library) is a declared
        # dependency, so this pulls it from PyPI automatically.
        run: pip install -e ".[test]"

      - name: Run the test suite
        run: python -m pytest tests/ -q

      - name: Smoke-test the console scripts
        run: |
          graphify-mesh-sync --help
          graphify-mesh-server --help
          graphify-mesh-reap --help
